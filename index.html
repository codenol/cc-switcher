<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cc-switcher — Настройки</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div class="app">
      <!-- Список аккаунтов -->
      <aside class="sidebar">
        <div class="sidebar-head">
          <span>Аккаунты</span>
          <button id="btn-new" class="icon-btn" title="Добавить аккаунт">＋</button>
        </div>
        <ul id="account-list" class="account-list"></ul>
      </aside>

      <!-- Форма редактирования -->
      <main class="editor">
        <form id="account-form" class="form" hidden>
          <label>
            Имя
            <input id="f-name" type="text" placeholder="Например, Аня (дневная смена)" required />
          </label>
          <label>
            Логин · почта
            <input id="f-email" type="email" placeholder="user@example.com" required />
          </label>
          <label>
            Пароль
            <input id="f-password" type="password" placeholder="••••••••" autocomplete="off" />
          </label>
          <label>
            Пароль почты
            <input id="f-email-password" type="password" placeholder="••••••••" autocomplete="off" />
          </label>
          <label>
            Ссылка на почтовый сервис
            <input id="f-email-url" type="url" placeholder="https://mail.example.com" />
          </label>

          <div class="cookie-status" id="cookie-status"></div>

          <div class="actions">
            <button type="submit" class="primary">Сохранить</button>
            <button type="button" id="btn-capture">Захватить текущий аккаунт</button>
            <button type="button" id="btn-delete" class="danger">Удалить</button>
          </div>
          <p class="hint" id="form-hint"></p>
        </form>

        <div id="empty-state" class="empty-state">
          <p>Выберите аккаунт слева или добавьте новый.</p>
          <p class="muted">
            Чтобы захватить аккаунт: войдите в него в Claude Desktop, затем нажмите
            «Захватить текущий аккаунт».
          </p>
        </div>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
  </body>
</html>
